<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHO - Dynamic Spacetime Visualizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0b111a;
            --panel-bg: #141c26;
            --sidebar-bg: #0f1620;
            --text-main: #e0f2fe;
            --text-muted: #7da5c4;
            --accent: #7dd3fc;
            --accent-glow: rgba(125, 211, 252, 0.4);
            --border-color: #24354a;
            --hover-bg: #1a2636;
            --font-stack: 'JetBrains Mono', monospace;
            --math-font: "Times New Roman", Times, serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font-stack); user-select: none; }

        body { background-color: #05080c; display: flex; justify-content: center; align-items: center; height: 100vh; color: var(--text-main); }

        .app-container {
            width: 1200px; height: 700px; background-color: var(--bg-base); border-radius: 12px;
            border: 1px solid var(--border-color); display: flex; overflow: hidden;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8), 0 0 15px var(--accent-glow); position: relative;
        }

        .sidebar { width: 260px; background-color: var(--sidebar-bg); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; z-index: 10;}
        .logo { padding: 24px; font-size: 24px; font-weight: 800; color: var(--accent); display: flex; align-items: center; gap: 10px; letter-spacing: 1.5px; text-shadow: 0 0 10px var(--accent-glow); }

        .nav-section { padding: 12px 0; }
        .nav-title { font-size: 11px; color: var(--text-muted); text-transform: uppercase; font-weight: 800; padding: 10px 24px; letter-spacing: 1px; }
        .nav-item { padding: 12px 24px; font-size: 13px; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; gap: 12px; transition: all 0.2s ease; position: relative; }
        .nav-item:hover { background-color: var(--hover-bg); color: var(--text-main); }
        .nav-item.active { background-color: #162a3f; color: var(--accent); font-weight: 600; }
        .nav-item.active::before { content: ''; position: absolute; left: 0; top: 10%; height: 80%; width: 4px; background-color: var(--accent); border-radius: 0 4px 4px 0; box-shadow: 0 0 8px var(--accent); }

        .main-content { flex: 1; padding: 24px; display: flex; gap: 24px; }
        .visualizer-panel { flex: 1.6; background-color: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; }
        .panel-header { padding: 16px 20px; font-size: 13px; font-weight: 600; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 8px; background: linear-gradient(180deg, #182330 0%, var(--panel-bg) 100%); }
        .panel-header svg { color: var(--accent); }

        .canvas-wrapper { flex: 1; display: flex; justify-content: center; align-items: center; background-color: #0b111a; position: relative; padding: 20px; }
        .plot-container { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        canvas { background: #0b111a; border: 1px solid var(--text-muted); box-shadow: 0 0 20px rgba(0,0,0,0.5); border-radius: 6px;}

        .info-panel { flex: 1; display: flex; flex-direction: column; gap: 20px; overflow-y: auto;}
        .card { background-color: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 8px; display: flex; flex-direction: column; flex-shrink: 0;}
        
        .equation-box { padding: 20px; border-bottom: 1px solid var(--border-color); text-align: center; }
        .equation-box h3 { font-size: 16px; font-weight: 600; margin-bottom: 6px; color: var(--text-main);}
        .equation-box p { font-size: 11px; color: var(--text-muted); margin-bottom: 15px; }
        .math-text { font-family: var(--math-font); font-size: 16px; color: var(--accent); text-align: center; letter-spacing: 1px; line-height: 1.5; }

        .controls-box { padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .control-group { display: flex; flex-direction: column; gap: 8px; transition: opacity 0.3s ease;}
        .control-group.disabled { opacity: 0.3; pointer-events: none; }
        .control-group label { font-size: 11px; color: var(--text-muted); display: flex; justify-content: space-between; align-items: center;}
        
        input[type="range"] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; height: 14px; width: 14px; border-radius: 50%; background: var(--accent); cursor: pointer; margin-top: -5px; box-shadow: 0 0 8px var(--accent-glow); }
        input[type="range"]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: var(--border-color); border-radius: 2px; }

        .switch { position: relative; display: inline-block; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #05080c; border: 1px solid var(--border-color); transition: .2s; border-radius: 18px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 2px; bottom: 2px; background-color: var(--text-muted); transition: .2s; border-radius: 50%; }
        input:checked + .slider { background-color: rgba(125, 211, 252, 0.2); border-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(16px); background-color: var(--accent); box-shadow: 0 0 5px var(--accent-glow); }

        .btn { background-color: rgba(125, 211, 252, 0.1); color: var(--accent); border: 1px solid var(--accent); padding: 10px; border-radius: 6px; font-weight: 600; cursor: pointer; transition: all 0.2s; text-align: center; font-size: 12px; outline: none; }
        .btn:hover { background-color: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent-glow); }

        .profile-area { margin-top: auto; padding: 20px 24px; border-top: 1px solid var(--border-color); display: flex; align-items: center; gap: 14px; background-color: #0c121b; }
        .avatar { width: 40px; height: 40px; background-color: var(--accent); border-radius: 8px; display: flex; justify-content: center; align-items: center; font-weight: bold; color: #000; font-size: 18px; box-shadow: 0 0 10px var(--accent-glow); }
        .profile-info .profile-name { font-size: 14px; font-weight: 600; color: var(--text-main); }
        .profile-info .profile-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

        .modal-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 200; justify-content: center; align-items: center; backdrop-filter: blur(3px); opacity: 0; transition: opacity 0.2s ease; }
        .modal-overlay.show { display: flex; opacity: 1; }
        .modal { background: var(--panel-bg); border: 1px solid var(--accent); border-radius: 8px; padding: 24px; width: 320px; display: flex; flex-direction: column; gap: 18px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); transform: translateY(20px); transition: transform 0.2s ease; }
        .modal-overlay.show .modal { transform: translateY(0); }
        .modal h4 { color: var(--text-main); font-size: 14px; font-weight: 600; text-align: center; margin-bottom: 5px; }
        .modal-input-wrapper { display: flex; flex-direction: column; gap: 8px; }
        .modal-input-wrapper label { font-size: 11px; color: var(--text-muted); text-align: center; }
        .modal input[type="number"] { background: #0b111a; border: 1px solid var(--border-color); color: var(--text-main); padding: 12px; border-radius: 6px; text-align: center; font-size: 16px; outline: none; transition: all 0.2s; }
        .modal input[type="number"]:focus { border-color: var(--accent); box-shadow: 0 0 8px var(--accent-glow); }
        .modal-btns { display: flex; gap: 12px; margin-top: 5px; }
        .modal-btns .btn { flex: 1; padding: 10px; }
        .btn-cancel { background: transparent; border-color: var(--border-color); color: var(--text-muted); }
        .btn-cancel:hover { background: var(--hover-bg); color: var(--text-main); box-shadow: none; border-color: var(--text-muted); }

        #toast { visibility: hidden; min-width: 250px; background-color: var(--hover-bg); color: var(--text-main); text-align: center; border-radius: 6px; padding: 16px; position: absolute; z-index: 100; left: 50%; bottom: 30px; transform: translateX(-50%); border: 1px solid var(--accent); font-size: 12px; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>

<div class="app-container">
    <aside class="sidebar">
        <div class="logo">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 4v2m-1-1h2" stroke-width="2"></path>
                <path d="M21 10v2m-1-1h2" stroke-width="2"></path>
                <path d="M9 12c2-3 5-4 8-3 1 0 3 2 4 4-2-1-4-1-6 0 2 1 3 3 3 5-2-1-4-2-6-1 1 2 2 3 2 4-3-1-5-2-6-2"></path>
                <path d="M9 12S6 8 4 9c0 0-2 4 1 6l1 5 3-1-1-4s3-1 4-3"></path>
            </svg>
            ECHO
        </div>

        <div class="nav-section">
            <div class="nav-title">Relativity Modes</div>
            <div class="nav-item active" onclick="setState('geodesics', this)">⊚ Equatorial Geodesics</div>
            <div class="nav-item" onclick="setState('potential', this)">⊚ Effective Potential</div>
            <div class="nav-item" onclick="setState('lapse', this)">⊚ Time Dilation Well</div>
        </div>
        
        <div class="nav-section">
            <div class="nav-title">Calculation</div>
            <div class="nav-item" onclick="exportData()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
                Data Export
            </div>
            <div class="nav-item" onclick="openConfigModal()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                Mass Config
            </div>
        </div>

        <div class="profile-area">
            <div class="avatar">D</div>
            <div class="profile-info">
                <div class="profile-name">Deniz</div>
                <div class="profile-sub" id="dateDisplay">Load Date...</div>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <div class="visualizer-panel">
            <div class="panel-header">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
                Dynamic Geodesic Engine
                <span id="stateLabel" style="margin-left:auto; color:var(--text-muted);"> Mode (Geodesics) | M=1</span>
            </div>
            <div class="canvas-wrapper">
                <div class="plot-container">
                    <canvas id="mathCanvas" width="550" height="500"></canvas>
                </div>
            </div>
        </div>

        <div class="info-panel">
            <div class="card">
                <div class="equation-box" id="eqBox">
                    </div>
            </div>

            <div class="card controls-box">
                <div class="control-group">
                    <label><span>Observation Domain (r_max)</span> <span id="scaleVal">15</span></label>
                    <input type="range" id="scaleSlider" min="5" max="40" value="15">
                </div>
                <div class="control-group" id="angleControl">
                    <label><span>Camera Angle (Tilt)</span> <span id="angleVal">60&deg;</span></label>
                    <input type="range" id="angleSlider" min="20" max="85" value="60">
                </div>
                
                <div style="height: 1px; background-color: var(--border-color); margin: 5px 0;"></div>

                <div class="control-group">
                    <label>
                        <span>Show Geodesic Path</span> 
                        <label class="switch">
                            <input type="checkbox" id="pathToggle" checked>
                            <span class="slider"></span>
                        </label>
                    </label>
                </div>
                <div class="control-group">
                    <label>
                        <span>Animate Particle Motion</span> 
                        <label class="switch">
                            <input type="checkbox" id="motionToggle">
                            <span class="slider"></span>
                        </label>
                    </label>
                </div>
                <div class="control-group" id="animControlsContainer">
                    <label><span>Specific Angular Momentum (L)</span> <span id="momVal">3.550</span></label>
                    <input type="range" id="momSlider" min="3.500" max="3.600" step="0.001" value="3.550">
                    
                    <label style="margin-top: 5px;"><span>Visual Particle Size</span></label>
                    <input type="range" id="pMassSlider" min="2" max="10" value="4">

                    <label style="margin-top: 5px;"><span>Animation Speed</span> <span id="speedVal">1.5x</span></label>
                    <input type="range" id="speedSlider" min="1" max="100" value="15">
                </div>
            </div>
        </div>
    </main>
    
    <div class="modal-overlay" id="configModal">
        <div class="modal">
            <h4>Singularity Configuration</h4>
            <div class="modal-input-wrapper">
                <label>Black Hole Mass (M)</label>
                <input type="number" id="mInput" min="0.1" step="0.5" value="1">
            </div>
            <div class="modal-btns">
                <button class="btn btn-cancel" onclick="closeConfigModal()">Cancel</button>
                <button class="btn" onclick="applyConfig()">Apply Settings</button>
            </div>
        </div>
    </div>

    <div id="toast">Message</div>
</div>

<script>
    const dateOpts = { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' };
    document.getElementById('dateDisplay').innerText = new Date().toLocaleDateString('en-US', dateOpts);

    const canvas = document.getElementById('mathCanvas');
    const ctx = canvas.getContext('2d');
    
    const bgCanvas = document.createElement('canvas');
    bgCanvas.width = 550; bgCanvas.height = 500;
    const bgCtx = bgCanvas.getContext('2d');

    const scaleSlider = document.getElementById('scaleSlider');
    const angleSlider = document.getElementById('angleSlider');
    const angleControl = document.getElementById('angleControl');
    const stateLabel = document.getElementById('stateLabel');
    const configModal = document.getElementById('configModal');
    const mInput = document.getElementById('mInput');
    const eqBox = document.getElementById('eqBox');
    
    const pathToggle = document.getElementById('pathToggle');
    const motionToggle = document.getElementById('motionToggle');
    const animControlsContainer = document.getElementById('animControlsContainer');
    const momSlider = document.getElementById('momSlider');
    const pMassSlider = document.getElementById('pMassSlider');
    const speedSlider = document.getElementById('speedSlider');

    let currentState = 'geodesics';
    let massM = 1;
    let animId = null;
    let particlePath = [];
    let particleProgress = 0;
    let particleDead = false;

    const relFunctions = {
        'potential': (r, rs) => {
            if (r <= rs) return null;
            const L = parseFloat(momSlider.value);
            return -((1 - rs/r) * (1 + (L*L)/(r*r))) * 3; 
        },
        'lapse': (r, rs) => r <= rs ? null : (Math.sqrt(1 - rs/r) - 1) * 10
    };

    const equations = {
        'geodesics': { title: "Equatorial Geodesics", desc: "Test particle trajectory warped by spacetime curvature.", eq: "<sup>d&sup2;u</sup>&frasl;<sub>d&phi;&sup2;</sub> + u = <sup>M</sup>&frasl;<sub>L&sup2;</sub> + 3Mu&sup2;" },
        'potential': { title: "Effective Potential", desc: "Radial dynamics potential well for massive particles.", eq: "V<sub>eff</sub>(r) = (1 - <sup>r<sub>s</sub></sup>&frasl;<sub>r</sub>)(1 + <sup>L<sup>2</sup></sup>&frasl;<sub>r<sup>2</sup></sub>)" },
        'lapse': { title: "Lapse Function", desc: "Gravitational time dilation gradient (funnel mapping).", eq: "&alpha;(r) = &radic;<span style='text-decoration:overline;'>1 - <sup>r<sub>s</sub></sup>&frasl;<sub>r</sub></span>" }
    };

    function initParticle() {
        particlePath = [];
        particleProgress = 0;
        particleDead = false;

        const L = parseFloat(momSlider.value); 
        const M = massM;
        const rs = 2 * M;
        const rMax = parseFloat(scaleSlider.value);
        
        let r_start = rMax * 0.8;
        let u = 1 / r_start;
        let v_u = 0; 
        let phi = 0;
        let dPhi = 0.005; 

        for(let step = 0; step < 50000; step++) {
            v_u += (M/(L*L) + 3*M*u*u - u) * dPhi;
            u += v_u * dPhi;
            phi += dPhi;

            if (u <= 0) break; 
            
            let currentR = 1/u;
            if (currentR > rMax * 5) break; 
            
            particlePath.push({r: currentR, phi: phi});

            // Halt integration precisely at the event horizon 
            if (currentR <= rs * 1.001) {
                // Pad with identical frames to visually pause before respawn
                for(let f=0; f<500; f++) particlePath.push({r: currentR, phi: phi});
                break; 
            }
        }
    }

    function triggerRender() {
        if (currentState === 'geodesics') renderGeodesics(bgCtx);
        else renderWireframe(bgCtx);

        if (animId) cancelAnimationFrame(animId);
        
        if (pathToggle.checked || motionToggle.checked) {
            initParticle();
            animControlsContainer.classList.remove('disabled');
            
            if (motionToggle.checked) {
                animate();
            } else {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(bgCanvas, 0, 0);
            }
        } else {
            animControlsContainer.classList.add('disabled');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(bgCanvas, 0, 0);
        }
    }

    function animate() {
        if (!motionToggle.checked) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(bgCanvas, 0, 0);

        const width = canvas.width;
        const height = canvas.height;
        const rs = 2 * massM;
        const rMax = parseFloat(scaleSlider.value);
        const tiltRad = parseFloat(angleSlider.value) * (Math.PI / 180);
        
        const scale = (width * 0.4) / rMax; 
        const cx = width / 2;
        const cy = currentState === 'geodesics' ? height / 2 : height / 2.5;
        const pSize = parseFloat(pMassSlider.value);
        const baseSpeed = parseFloat(speedSlider.value); 

        function project(r, phi) {
            const x = r * Math.cos(phi);
            const y = r * Math.sin(phi);
            if (currentState === 'geodesics') {
                return { x: cx + x * scale, y: cy - y * scale }; 
            } else {
                let z;
                if (r <= rs) {
                    z = -20 * (rs / Math.max(r, 0.01)); 
                    z = Math.max(z, -rMax * 2); 
                } else {
                    z = relFunctions[currentState](r, rs);
                }
                return { 
                    x: cx + x * scale, 
                    y: cy + (y * Math.cos(tiltRad) + z * Math.sin(tiltRad)) * scale 
                };
            }
        }

        if (!particleDead && particlePath.length > 0) {
            
            let currentIdx = Math.min(Math.floor(particleProgress), particlePath.length - 1);
            let currentR = particlePath[currentIdx].r;
            
            // 1. Time Dilation: Asymptotically brake the particle at the horizon
            let lapseSquared = 1 - (rs / currentR);
            if (lapseSquared < 0) lapseSquared = 0;
            
            // Add epsilon so it doesn't freeze entirely
            let timeDilatedSpeed = baseSpeed * (lapseSquared + 0.015);
            particleProgress += timeDilatedSpeed;
            
            let idx = Math.floor(particleProgress);
            let nextIdx = idx + 1;
            
            if (nextIdx >= particlePath.length) {
                let lastR = particlePath[particlePath.length-1].r;
                if (lastR <= rs * 1.05 || lastR > rMax * 2) particleDead = true; 
                else particleProgress = 0; 
            } else {
                const pt1 = particlePath[idx];
                const pt2 = particlePath[nextIdx];
                const t = particleProgress - idx;
                
                const r = pt1.r + (pt2.r - pt1.r) * t;
                const phi = pt1.phi + (pt2.phi - pt1.phi) * t;
                const proj = project(r, phi);
                
                // 2. Exact Gravitational Redshift
                let z_factor = 0;
                if (r > rs * 1.001) {
                    z_factor = (1 / Math.sqrt(1 - (rs/r))) - 1;
                } else {
                    z_factor = 100; 
                }

                let shiftRatio = Math.min(z_factor / 5, 1.0); 

                let cr = Math.floor(125 + (255 - 125) * shiftRatio);
                let cg = Math.floor(211 * (1 - shiftRatio));
                let cb = Math.floor(252 * (1 - shiftRatio));
                
                let alpha = Math.max(0, 1.0 - (z_factor / 10));

                ctx.beginPath();
                ctx.arc(proj.x, proj.y, pSize * 2, 0, 2*Math.PI);
                ctx.fillStyle = `rgba(${cr}, ${cg}, ${cb}, ${0.4 * alpha})`;
                ctx.fill();

                ctx.beginPath();
                ctx.arc(proj.x, proj.y, pSize, 0, 2*Math.PI);
                ctx.fillStyle = `rgba(${Math.min(255, cr+50)}, ${cg}, ${cb}, ${alpha})`;
                ctx.fill();
                ctx.strokeStyle = `rgba(${cr}, ${cg}, ${cb}, ${alpha})`;
                ctx.lineWidth = 1;
                ctx.stroke();
            }
        }

        if (motionToggle.checked) {
            animId = requestAnimationFrame(animate);
            if (particleDead) initParticle(); 
        }
    }

    function renderGeodesics(context) {
        const width = bgCanvas.width;
        const height = bgCanvas.height;
        const M = massM;
        const rs = 2 * M; 
        const rMax = parseFloat(scaleSlider.value);
        const pxPerUnit = (width * 0.45) / rMax;
        const cx = width / 2;
        const cy = height / 2;
        
        context.fillStyle = '#0b111a';
        context.fillRect(0, 0, width, height);

        // Photon Sphere (r = 1.5 * rs)
        context.beginPath();
        context.arc(cx, cy, 1.5 * rs * pxPerUnit, 0, 2 * Math.PI);
        context.fillStyle = 'rgba(255, 150, 50, 0.03)';
        context.fill();
        context.setLineDash([4, 4]);
        context.strokeStyle = 'rgba(255, 150, 50, 0.4)';
        context.lineWidth = 1;
        context.stroke();
        context.setLineDash([]);

        context.strokeStyle = 'rgba(125, 211, 252, 0.1)';
        context.lineWidth = 1;
        context.beginPath();
        context.moveTo(cx, 0); context.lineTo(cx, height);
        context.moveTo(0, cy); context.lineTo(width, cy);
        context.stroke();

        // Draw static path if toggled
        if (pathToggle.checked && particlePath && particlePath.length > 0) {
            context.strokeStyle = 'rgba(125, 211, 252, 0.25)';
            context.lineWidth = 1.5;
            context.beginPath();
            let started = false;
            for(let i=0; i<particlePath.length; i+=5) {
                const pt = particlePath[i];
                if(pt.r > rMax) continue;
                const x = cx + pt.r * Math.cos(pt.phi) * pxPerUnit;
                const y = cy - pt.r * Math.sin(pt.phi) * pxPerUnit;
                if(!started) { context.moveTo(x,y); started = true; }
                else context.lineTo(x,y);
            }
            context.stroke();
        }

        // Event Horizon
        context.beginPath();
        context.arc(cx, cy, rs * pxPerUnit, 0, 2 * Math.PI);
        context.fillStyle = '#000000';
        context.fill();
        context.strokeStyle = 'rgba(255, 50, 50, 0.9)';
        context.lineWidth = 2;
        context.stroke();
    }

    function renderWireframe(context) {
        const width = bgCanvas.width;
        const height = bgCanvas.height;
        const rs = 2 * massM; 
        const rMax = parseFloat(scaleSlider.value);
        const tiltRad = parseFloat(angleSlider.value) * (Math.PI / 180);
        const func = relFunctions[currentState];
        
        context.fillStyle = '#0b111a';
        context.fillRect(0, 0, width, height);

        const scale = (width * 0.4) / rMax; 
        const cx = width / 2;
        const cy = height / 2.5;

        function project(x, y, z) {
            return { 
                x: cx + x * scale, 
                y: cy + (y * Math.cos(tiltRad) + z * Math.sin(tiltRad)) * scale 
            };
        }

        const rings = 25;
        const spokes = 36;
        const mesh = [];

        for (let i = rings; i >= 0; i--) {
            const t = i / rings;
            const r = rs + (rMax - rs) * (t * t); 
            if (r < rs) continue;
            const z = func(r, rs);
            if (z === null) continue;

            const ringPts = [];
            for (let j = 0; j <= spokes; j++) {
                const angle = (j / spokes) * Math.PI * 2;
                ringPts.push({ x: r*Math.cos(angle), y: r*Math.sin(angle), z: z, r: r });
            }
            mesh.push(ringPts);
        }

        function getColor(z) {
            let ratio = Math.abs(z / rMax); 
            if(ratio > 1) ratio = 1;
            return `rgba(${Math.floor(125 - ratio * 100)}, ${Math.floor(211 - ratio * 150)}, ${Math.floor(252 - ratio * 50)}, 0.8)`;
        }

        context.lineWidth = 1;
        context.lineJoin = 'round';

        for (let j = 0; j <= spokes; j++) {
            context.beginPath();
            let started = false;
            for (let i = 0; i < mesh.length; i++) {
                const proj = project(mesh[i][j].x, mesh[i][j].y, mesh[i][j].z);
                if (!started) { context.moveTo(proj.x, proj.y); started = true; } 
                else { context.lineTo(proj.x, proj.y); }
            }
            context.strokeStyle = 'rgba(125, 211, 252, 0.15)'; 
            context.stroke();
        }

        for (let i = 0; i < mesh.length; i++) {
            const ring = mesh[i];
            context.beginPath();
            context.strokeStyle = getColor(ring[0].z);
            
            if (ring[0].r < rs * 2) {
                context.shadowBlur = 8;
                context.shadowColor = context.strokeStyle;
            } else context.shadowBlur = 0;

            for (let j = 0; j < ring.length; j++) {
                const proj = project(ring[j].x, ring[j].y, ring[j].z);
                if (j === 0) context.moveTo(proj.x, proj.y);
                else context.lineTo(proj.x, proj.y);
            }
            context.stroke();
        }
        context.shadowBlur = 0;

        if (pathToggle.checked && particlePath && particlePath.length > 0) {
            context.strokeStyle = 'rgba(125, 211, 252, 0.8)';
            context.lineWidth = 2;
            context.beginPath();
            let started = false;
            for(let i=0; i<particlePath.length; i+=5) {
                const pt = particlePath[i];
                if(pt.r > rMax) continue;
                let z;
                if(pt.r <= rs) z = -20 * (rs / Math.max(pt.r, 0.01));
                else z = func(pt.r, rs);
                
                const proj = project(pt.r * Math.cos(pt.phi), pt.r * Math.sin(pt.phi), z);
                if(!started) { context.moveTo(proj.x, proj.y); started = true; }
                else context.lineTo(proj.x, proj.y);
            }
            context.stroke();
        }

        if (mesh.length > 0) {
            const inner = mesh[mesh.length - 1]; 
            context.beginPath();
            for (let j = 0; j < inner.length; j++) {
                const proj = project(inner[j].x, inner[j].y, inner[j].z);
                if (j === 0) context.moveTo(proj.x, proj.y);
                else context.lineTo(proj.x, proj.y);
            }
            context.fillStyle = '#000000';
            context.fill();
            context.strokeStyle = 'rgba(255, 50, 50, 0.8)'; 
            context.lineWidth = 2;
            context.stroke();
        }
    }

    window.setState = function(state, element) {
        currentState = state;
        let formattedState = state.charAt(0).toUpperCase() + state.slice(1);
        if(state === 'geodesics') formattedState = "Geodesics";
        stateLabel.innerText = ` Mode (${formattedState}) | M=${massM}`;
        
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        element.classList.add('active');
        
        const eqData = equations[state];
        eqBox.innerHTML = `<h3>${eqData.title}</h3><p>${eqData.desc}</p><div class="math-text">${eqData.eq}</div>`;

        if (state === 'geodesics') angleControl.classList.add('disabled');
        else angleControl.classList.remove('disabled');

        triggerRender();
    }

    scaleSlider.addEventListener('input', (e) => {
        document.getElementById('scaleVal').innerText = e.target.value;
        triggerRender();
    });

    angleSlider.addEventListener('input', (e) => {
        document.getElementById('angleVal').innerText = e.target.value + '°';
        triggerRender();
    });

    pathToggle.addEventListener('change', () => { triggerRender(); });
    motionToggle.addEventListener('change', () => { triggerRender(); });

    momSlider.addEventListener('input', (e) => {
        document.getElementById('momVal').innerText = parseFloat(e.target.value).toFixed(3);
        if (pathToggle.checked || motionToggle.checked) {
            initParticle(); 
            triggerRender(); 
        }
    });
    
    speedSlider.addEventListener('input', (e) => {
        document.getElementById('speedVal').innerText = (e.target.value / 10).toFixed(1) + 'x';
    });

    function showToast(msg) {
        const toast = document.getElementById("toast");
        toast.innerHTML = msg;
        toast.className = "show";
        setTimeout(() => toast.className = toast.className.replace("show", ""), 3000);
    }

    function exportData() {
        showToast("Generating export data...");
        
        const rs = 2 * massM;
        const rMax = parseFloat(scaleSlider.value);
        let content = `ECHO GENERAL RELATIVITY EXPORT\n`;
        content += `Mode: ${currentState} | Black Hole Mass (M): ${massM} | Horizon (rs): ${rs}\n`;
        content += `Domain Radius (r_max): ${rMax}\n\n`;

        if (currentState === 'geodesics') {
            content += `Data: Massive Particle Geodesic Trajectory\n`;
            content += `Specific Angular Momentum (L): ${momSlider.value}\n`;
            content += `Columns: Step, r, phi(rad), x, y\n\n`;
            
            let L = parseFloat(momSlider.value); 
            let M = massM;
            let r_start = rMax * 0.8;
            let u = 1 / r_start;
            let v_u = 0; 
            let phi = 0;
            let dPhi = 0.005; 
            
            let exportPath = [];
            for(let step = 0; step < 20000; step++) {
                v_u += (M/(L*L) + 3*M*u*u - u) * dPhi;
                u += v_u * dPhi;
                phi += dPhi;
                if (u <= 0) break; 
                let currentR = 1/u;
                if (currentR > rMax * 5) break; 
                exportPath.push({r: currentR, phi: phi});
                if (currentR < rs * 1.002) break; 
            }
            
            for(let i=0; i<exportPath.length; i++) {
                let pt = exportPath[i];
                let x = pt.r * Math.cos(pt.phi);
                let y = pt.r * Math.sin(pt.phi);
                content += `${i}\t${pt.r.toFixed(5)}\t${pt.phi.toFixed(5)}\t${x.toFixed(5)}\t${y.toFixed(5)}\n`;
            }
            
        } else {
            content += `Data: 50x50 Spatial Matrix (Z-Depth)\n`;
            content += `Tilt Angle: ${angleSlider.value} deg\n\n`;
            
            const res = 50;
            const func = relFunctions[currentState];
            
            for (let py = 0; py < res; py++) {
                let row = [];
                for (let px = 0; px < res; px++) {
                    const x = (px - res/2) / (res/2 / rMax);
                    const y = -(py - res/2) / (res/2 / rMax);
                    const r = Math.sqrt(x*x + y*y);
                    
                    if (r <= rs) {
                        row.push("NaN"); 
                    } else {
                        let z = func(r, rs);
                        row.push(z !== null ? z.toFixed(5) : "NaN");
                    }
                }
                content += row.join("\t") + "\n";
            }
        }

        const blob = new Blob([content], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `echo_M${massM}_${currentState}.txt`;
        a.click();
        
        showToast("Export complete.");
    }

    function openConfigModal() {
        mInput.value = massM;
        configModal.classList.add('show');
        setTimeout(() => mInput.focus(), 100);
    }

    function closeConfigModal() { configModal.classList.remove('show'); }

    function applyConfig() {
        const val = parseFloat(mInput.value);
        if (!isNaN(val) && val > 0) {
            massM = val;
            let formattedState = currentState.charAt(0).toUpperCase() + currentState.slice(1);
            if(currentState === 'geodesics') formattedState = "Geodesics";
            stateLabel.innerText = ` Mode (${formattedState}) | M=${massM}`;
            triggerRender();
            closeConfigModal();
            showToast(`Mass updated to M=${massM}`);
        } else showToast("Error: Mass must be positive.");
    }

    configModal.addEventListener('click', (e) => { if (e.target === configModal) closeConfigModal(); });
    mInput.addEventListener('keyup', (e) => { if (e.key === 'Enter') applyConfig(); });

    // Initialize
    const initData = equations[currentState];
    eqBox.innerHTML = `<h3>${initData.title}</h3><p>${initData.desc}</p><div class="math-text">${initData.eq}</div>`;
    angleControl.classList.add('disabled');
    
    motionToggle.checked = false;
    triggerRender();
</script>
</body>
